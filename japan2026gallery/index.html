<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@2.2.3/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.sound@0.3.0/dist/p5.sound.min.js"></script>
    <script src="images/registry.js"></script>
</head>
<body>
    <div id="banner">
        <div id="banner-darken"></div>
        <p id="heading">日本2026</p>
    </div>

        <button class="filtbtn" onclick=toggleShotByBen()>Ben</button>
        <button class="filtbtn" onclick=toggleShotByCam() id="sbCamBtn">Cameron</button>
        <button class="filtbtn" onclick=toggleShotByJen() id="sbJenBtn">Jen</button>
        <button class="filtbtn">Jed</button>
        <button class="filtbtn">Tom</button>
        <button class="filtbtn">Foxx</button>
    </div>
    <script src="sketch.js"></script>
    <div id="window-container"></div>

</html>
